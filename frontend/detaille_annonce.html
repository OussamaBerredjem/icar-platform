<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Icar | Détails de l'annonce</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-elevated: #f1f5f9;
      --border: #e2e8f0;
      --text-primary: #002d8f;
      --text-secondary: #0e2546;
      --text-muted: #081e3d;
      --accent: #07153a;
      --accent-dark: #20283e;
      --accent-soft: #dbeafe;
      --accent-glow: rgba(54, 78, 129, 0.08);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 4px 8px rgba(0,0,0,0.03);
      --shadow-md: 0 8px 20px -4px rgba(0,0,0,0.08);
      --radius-card: 24px;
      --radius-sm: 14px;
      --transition: all 0.2s ease;
      --success: #10b981;
      --error: #dc2626;
      --whatsapp: #25D366;
      --telegram: #0088cc;
    }

    body.dark {
      --bg: #0b1120;
      --surface: #111827;
      --surface-elevated: #1e293b;
      --border: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-dark: #2563eb;
      --accent-soft: #1e2a3e;
      --shadow-md: 0 8px 20px -4px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      transition: background 0.3s, color 0.2s;
      scroll-behavior: smooth;
    }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 57px;
      backdrop-filter: blur(20px);
      background: color-mix(in srgb, var(--bg) 75%, transparent);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
    }
    body.dark .navbar { background: color-mix(in srgb, #0b1120 85%, transparent); }

    .nav-container {
      max-width: 1800px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo-symbol {
      width: 29px;
      height: 29px;
      background: var(--accent);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 20px;
      color: white;
    }
    .logo-text {
      font-weight: 600;
      font-size: 20px;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .logo-text span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 600;
      color: var(--text-secondary);
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    .theme-toggle {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      transition: var(--transition);
    }
    .theme-toggle:hover { background: var(--accent-soft); }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .btn-primary {
      background: var(--accent);
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }

    /* Main Content */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 40px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      margin-bottom: 24px;
      transition: var(--transition);
    }
    .back-link:hover { color: var(--accent); }

    .ad-details-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 32px;
    }

    @media (max-width: 900px) {
      .ad-details-grid { grid-template-columns: 1fr; }
      .container { padding: 20px; }
      .navbar { padding: 0 20px; }
    }

    /* Gallery */
    .gallery-section {
      background: var(--surface);
      border-radius: var(--radius-card);
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .main-image-container {
      position: relative;
      width: 100%;
      height: 450px;
      background: var(--surface-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .main-image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }
    .gallery-nav:hover { background: rgba(0,0,0,0.8); }
    .gallery-nav.prev { left: 16px; }
    .gallery-nav.next { right: 16px; }

    .thumbnails {
      display: flex;
      gap: 12px;
      padding: 16px;
      overflow-x: auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .thumbnail:hover { transform: translateY(-2px); }
    .thumbnail.active { border-color: var(--accent); transform: scale(1.02); }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }

    /* Ad Info */
    .ad-info {
      background: var(--surface);
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 24px;
    }
    .ad-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .ad-price { font-size: 32px; font-weight: 800; color: var(--accent); margin: 16px 0; }
    .ad-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 16px 0;
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .meta-item svg { width: 16px; height: 16px; stroke: currentColor; }
    .ad-description { line-height: 1.7; color: var(--text-secondary); margin: 20px 0; white-space: pre-line; }
    .ad-description h3 { font-size: 18px; margin-bottom: 12px; color: var(--text-primary); }

    /* Specs Grid */
    .specs-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 20px 0;
    }
    .spec-item {
      background: var(--surface-elevated);
      border-radius: 16px;
      padding: 16px;
    }
    .spec-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
    .spec-value { font-size: 16px; font-weight: 700; color: var(--text-primary); }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .status-badge.active { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .status-badge.sold { background: rgba(220,38,38,0.1); color: var(--error); border: 1px solid rgba(220,38,38,0.3); }

    /* Sidebar */
    .sidebar-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 24px;
    }
    .seller-info { text-align: center; }
    .seller-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .seller-avatar svg { width: 40px; height: 40px; stroke: white; }
    .seller-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .seller-since { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }

    .contact-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }
    .contact-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .contact-btn.call { background: var(--accent); color: white; }
    .contact-btn.whatsapp { background: var(--whatsapp); color: white; }
    .contact-btn.telegram { background: var(--telegram); color: white; }
    .contact-btn.copy { background: var(--surface-elevated); color: var(--text-primary); border: 1px solid var(--border); }
    .contact-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .action-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 40px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Loading & Toast */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }
    .spin {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--surface);
      border-left: 4px solid var(--accent);
      padding: 12px 20px;
      border-radius: 60px;
      box-shadow: var(--shadow-md);
      z-index: 1100;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    footer {
      background: linear-gradient(135deg, #07153af7 0%, #0a1a4aef 100%);
      color: white;
      padding: 60px 40px 40px;
      margin-top: 60px;
    }
    .footer-inner { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 40px; }
    .footer-col h4 { font-size: 18px; margin-bottom: 20px; color: #ffd700; }
    .footer-col p { color: rgba(255,255,255,0.7); margin-bottom: 12px; }
    .footer-bottom { text-align: center; padding-top: 40px; margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); font-size: 14px; }
  </style>
</head>
<body>

<header class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <div class="logo-symbol">I</div>
      <div class="logo-text">I<span>car</span></div>
    </a>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="index.html#categories">Annonces</a>
      <button class="theme-toggle" id="themeToggle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/><circle cx="12" cy="12" r="4"/></svg>
        <span>Thème</span>
      </button>
      <button class="btn-outline" id="publishBtn">Publier</button>
    </div>
  </div>
</header>

<main>
  <div class="container" id="adContainer">
    <a href="index.html" class="back-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour aux annonces
    </a>
    <div id="loadingIndicator" class="loading"><div class="spin"></div> Chargement...</div>
    <div id="adContent" style="display: none;"></div>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-col">
      <div class="logo-text" style="font-size:24px; color:white;">I<span style="color:#ffd700">car</span></div>
      <p style="margin-top:16px;">Leader de la confiance automobile en Algérie.</p>
    </div>
    <div class="footer-col"><h4>Explorer</h4><p>Annonces</p><p>Location</p><p>Vendre ma voiture</p></div>
    <div class="footer-col"><h4>Support</h4><p>FAQ</p><p>Contactez-nous</p></div>
    <div class="footer-col"><h4>Légal</h4><p>CGU</p><p>Confidentialité</p></div>
  </div>
  <div class="footer-bottom">© 2026 Icar Tous droits réservés | Marketplace automobile Algérie</div>
</footer>

<div id="toastMessage" class="toast"></div>

<script>
  // Récupérer l'ID depuis l'URL
  const urlParams = new URLSearchParams(window.location.search);
  const adId = urlParams.get('id');

  // Éléments DOM
  const loadingEl = document.getElementById('loadingIndicator');
  const adContentEl = document.getElementById('adContent');
  const container = document.getElementById('adContainer');

  // Variables pour la galerie
  let currentImageIndex = 0;
  let currentImages = [];

  function showToast(message) {
    const toast = document.getElementById('toastMessage');
    toast.innerText = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  function formatPrice(price) {
    if (!price) return 'Prix non spécifié';
    return Number(price).toLocaleString('fr-DZ') + ' DA';
  }

  function formatDate(dateString) {
    if (!dateString) return '—';
    return new Date(dateString).toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function formatMilage(milage) {
    if (!milage) return '—';
    return Number(milage).toLocaleString() + ' km';
  }

  // Récupérer les détails de l'annonce
  async function fetchAdDetails() {
    if (!adId) {
      loadingEl.innerHTML = '<div class="loading">❌ Aucun ID d\'annonce spécifié</div>';
      return;
    }

    try {
      const response = await fetch(`https://api.icaralgerie.com/catalog/api/vehicules/${adId}/`);
      if (!response.ok) throw new Error('Annonce non trouvée');
      const car = await response.json();
      renderAdDetails(car);
    } catch (error) {
      console.error('Erreur:', error);
      loadingEl.innerHTML = '<div class="loading">❌ Impossible de charger les détails de l\'annonce</div>';
    }
  }

  // Récupérer toutes les images du véhicule
  function getAllImages(car) {
    const images = [];
    if (car.images && car.images.length > 0) {
      car.images.forEach(img => {
        const url = img.image_url || img.image;
        if (url) images.push(url);
      });
    }
    if (images.length === 0) {
      images.push('https://placehold.co/800x500/e2e8f0/1e293b?text=Image+non+disponible');
    }
    return images;
  }

  // Rendre la galerie
  function renderGallery() {
    const galleryHtml = `
      <div class="gallery-section">
        <div class="main-image-container" id="mainImageContainer">
          <button class="gallery-nav prev" id="galleryPrev">‹</button>
          <button class="gallery-nav next" id="galleryNext">›</button>
          <img id="mainImage" src="${currentImages[currentImageIndex]}" alt="Image principale">
        </div>
        <div class="thumbnails" id="thumbnailsContainer">
          ${currentImages.map((img, index) => `
            <div class="thumbnail ${index === currentImageIndex ? 'active' : ''}" data-index="${index}">
              <img src="${img}" alt="Miniature ${index + 1}" onerror="this.src='https://placehold.co/80x80/e2e8f0/1e293b?text=Error'">
            </div>
          `).join('')}
        </div>
      </div>
    `;
    return galleryHtml;
  }

  // Initialiser la galerie après le rendu
  function initGallery() {
    const mainImage = document.getElementById('mainImage');
    const prevBtn = document.getElementById('galleryPrev');
    const nextBtn = document.getElementById('galleryNext');
    const thumbnails = document.querySelectorAll('.thumbnail');

    if (prevBtn) {
      prevBtn.addEventListener('click', () => {
        currentImageIndex = (currentImageIndex - 1 + currentImages.length) % currentImages.length;
        mainImage.src = currentImages[currentImageIndex];
        updateThumbnails();
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener('click', () => {
        currentImageIndex = (currentImageIndex + 1) % currentImages.length;
        mainImage.src = currentImages[currentImageIndex];
        updateThumbnails();
      });
    }

    thumbnails.forEach(thumb => {
      thumb.addEventListener('click', () => {
        currentImageIndex = parseInt(thumb.dataset.index);
        mainImage.src = currentImages[currentImageIndex];
        updateThumbnails();
      });
    });
  }

  function updateThumbnails() {
    const thumbnails = document.querySelectorAll('.thumbnail');
    thumbnails.forEach((thumb, idx) => {
      if (idx === currentImageIndex) {
        thumb.classList.add('active');
      } else {
        thumb.classList.remove('active');
      }
    });
  }

  // Rendre tous les détails
  function renderAdDetails(car) {
    currentImages = getAllImages(car);
    currentImageIndex = 0;

    const transmissionText = car.transmissionType === 'AUTOMATIC' ? 'Automatique' : 'Manuelle';
    const statusClass = car.status === 'ACTIVE' ? 'active' : 'sold';
    const statusText = car.status === 'ACTIVE' ? '✓ Disponible' : '✗ Vendu';

    const html = `
      <div class="ad-details-grid">
        <div>
          ${renderGallery()}
          
          <div class="ad-info">
            <span class="status-badge ${statusClass}">${statusText}</span>
            <h1 class="ad-title">${car.brand || ''} ${car.name || ''} (${car.year || 'Année inconnue'})</h1>
            <div class="ad-price">${formatPrice(car.price)}</div>
            
            <div class="ad-meta">
              <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>${car.location || 'Localisation non spécifiée'}</span>
              <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${formatMilage(car.milage)}</span>
              <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>${car.fuel || 'Non spécifié'}</span>
              <span class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>${transmissionText}</span>
            </div>
            
            <div class="ad-description">
              <h3>Description</h3>
              <p>${car.description || 'Aucune description fournie pour cette annonce.'}</p>
            </div>
            
            <div class="specs-grid">
              <div class="spec-item"><div class="spec-label">Marque</div><div class="spec-value">${car.brand || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Modèle</div><div class="spec-value">${car.name || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Année</div><div class="spec-value">${car.year || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Kilométrage</div><div class="spec-value">${formatMilage(car.milage)}</div></div>
              <div class="spec-item"><div class="spec-label">Carburant</div><div class="spec-value">${car.fuel || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Transmission</div><div class="spec-value">${transmissionText}</div></div>
              <div class="spec-item"><div class="spec-label">Couleur</div><div class="spec-value">${car.coleur || car.color || '—'}</div></div>
              <div class="spec-item"><div class="spec-label">Catégorie</div><div class="spec-value">${car.category?.name || car.subcategory?.name || '—'}</div></div>
            </div>
          </div>
        </div>
        
        <div>
          <div class="sidebar-card">
            <div class="seller-info">
              <div class="seller-avatar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div class="seller-name">${car.user?.name || 'Vendeur'}</div>
              <div class="seller-since">Membre depuis ${formatDate(car.created_at)}</div>
            </div>
            
            <div class="contact-buttons">
              <button class="contact-btn call" onclick="window.location.href='tel:${car.phone}'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
                Appeler
              </button>
              <button class="contact-btn whatsapp" onclick="openWhatsApp('${car.phone}')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                WhatsApp
              </button>
              <button class="contact-btn telegram" onclick="openTelegram('${car.phone}')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                Telegram
              </button>
              <button class="contact-btn copy" id="copyPhoneBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copier le numéro
              </button>
            </div>
          </div>
          
          <div class="sidebar-card">
            <div class="action-buttons">
              <button class="action-btn" id="shareBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                Partager
              </button>
              <button class="action-btn" id="reportBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor" stroke="none"/></svg>
                Signaler
              </button>
            </div>
          </div>
        </div>
      </div>
    `;

    loadingEl.style.display = 'none';
    adContentEl.style.display = 'block';
    adContentEl.innerHTML = html;

    // Initialiser la galerie
    initGallery();

    // Événements
    document.getElementById('copyPhoneBtn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(car.phone || '');
      showToast('Numéro copié dans le presse-papier');
    });

    document.getElementById('shareBtn')?.addEventListener('click', () => {
      if (navigator.share) {
        navigator.share({
          title: `${car.brand} ${car.name}`,
          text: `Découvrez cette annonce sur Icar`,
          url: window.location.href
        });
      } else {
          navigator.clipboard.writeText(window.location.href);
          showToast('Lien copié dans le presse-papier');
      }
    });

    document.getElementById('reportBtn')?.addEventListener('click', () => {
      showToast('Signalement envoyé. Nous traiterons votre demande rapidement.');
    });
  }

  // Fonctions de contact
  window.openWhatsApp = function(phone) {
    const formattedPhone = phone.replace(/[^0-9]/g, '');
    const message = encodeURIComponent(`Bonjour, je suis intéressé par votre annonce sur Icar.`);
    window.open(`https://wa.me/${formattedPhone}?text=${message}`);
  };

  window.openTelegram = function(phone) {
    const formattedPhone = phone.replace(/[^0-9]/g, '');
    window.open(`https://t.me/${formattedPhone}`);
  };

  // Thème
  document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('dark');
  });

  document.getElementById('publishBtn').addEventListener('click', () => {
    window.location.href = 'publish_ad.html';
  });

  // Chargement
  fetchAdDetails();
</script>
</body>
</html>
